name: Deploy Web App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Docker/Dockerfile.web
          push: true
          tags: |
            rakeshpaulraj/web:${{ github.sha }}

      - name: Deploy to server
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key

          cat > deploy.sh << 'DEPLOY_EOF'
          #!/bin/bash
          set -e
          sudo docker stop web_app || true
          sudo docker rm web_app || true
          sudo docker run -d --name web_app -p 3000:3000 \
            -e JWT_SECRET="$JWT_SECRET" \
            -e NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            -e NEXTAUTH_URL="$NEXTAUTH_URL" \
            -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            -e DATABASE_URL="$DATABASE_URL" \
            -e GOOGLE_API_KEY="$GOOGLE_API_KEY" \
            rakeshpaulraj/web:$IMAGE_TAG
          DEPLOY_EOF

          chmod +x deploy.sh
          scp -o StrictHostKeyChecking=no -i ~/ssh_key deploy.sh azureuser@57.159.28.23:~/deploy.sh
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key azureuser@57.159.28.23 \
            "JWT_SECRET='$JWT_SECRET' NEXTAUTH_SECRET='$NEXTAUTH_SECRET' NEXTAUTH_URL='$NEXTAUTH_URL' GOOGLE_CLIENT_ID='$GOOGLE_CLIENT_ID' GOOGLE_CLIENT_SECRET='$GOOGLE_CLIENT_SECRET' DATABASE_URL='$DATABASE_URL' GOOGLE_API_KEY='$GOOGLE_API_KEY' IMAGE_TAG='$IMAGE_TAG' bash ~/deploy.sh"